spring:
  application:
    name: backend

  datasource:
    url: jdbc:mysql://3.34.63.161:9722/stylehub_b2b?useSSL=false&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: root        # 환경변수로 관리 (하드코딩 금지)
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10         # 커넥션 풀 최대 크기 (동시 DB 연결 수)
      minimum-idle: 5               # 최소 유지 커넥션 수
      connection-timeout: 30000     # 커넥션 획득 대기 최대 시간 (ms)

  jpa:
    hibernate:
      ddl-auto: update            # 운영: validate / 개발: update (절대 create-drop 쓰지 말것)
    show-sql: false                  # 실행 SQL 콘솔 출력 (운영에선 false 권장)
    properties:
      hibernate:
        format_sql: true            # SQL 줄바꿈 포맷팅
        default_batch_fetch_size: 100  # N+1 문제 완화 (IN절로 배치 로딩)
    open-in-view: false             # OSIV 끄기 (트랜잭션 밖에서 지연로딩 방지 - 권장)

  data:
    redis:
      host: ${REDIS_HOST:localhost}   # 기본값 localhost (콜론 뒤가 기본값)
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}    # 없으면 빈값

jwt:
  secret: ${JWT_SECRET}           # 최소 32자 이상 랜덤 문자열 (환경변수로 관리)
  access-expiration: 1800000      # 30분 (ms)
  refresh-expiration: 604800000   # 7일 (ms)